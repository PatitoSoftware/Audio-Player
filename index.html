<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: transparent;
}

.player {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #111;
  padding: 10px;
  border-radius: 12px;
  width: 220px;
}

button {
  background: #222;
  color: white;
  border: none;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  cursor: pointer;
}

input {
  width: 100px;
}
</style>
</head>

<body>

<div class="player">
  <button onclick="toggle()">▶</button>
  <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="volume(this.value)">
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");

const params = new URLSearchParams(window.location.search);
const audioSrc = params.get("audio");

if (audioSrc) {
  audio.src = audioSrc;
}

function toggle() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function volume(v) {
  audio.volume = v;
}
</script>

</body>
</html>
